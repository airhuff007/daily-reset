<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exercise Library — The Field Manual</title>
<style>
  :root {
    --ink: #1A1D1B;
    --ink-soft: #2B2F2C;
    --ink-card: #232622;
    --bone: #E8E2D4;
    --bone-dim: #C9C2AE;
    --bone-faint: #8B8576;
    --brass: #8C7A4E;
    --brass-bright: #B59B5F;
    --signal: #5C7A5C;
    --rust: #A35238;
    --hairline: rgba(232,226,212,0.14);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--ink);
    color: var(--bone);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .display {
    font-family: 'Arial Narrow', 'Oswald', sans-serif;
    font-weight: 800;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  ::selection { background: var(--brass); color: var(--ink); }

  /* MASTHEAD */
  .masthead {
    border-bottom: 1px solid var(--hairline);
    padding: 26px 20px 20px;
    position: sticky; top: 0;
    background: var(--ink);
    z-index: 60;
  }
  .masthead-inner { max-width: 980px; margin: 0 auto; }
  .masthead-top { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 18px; }
  .masthead-title { font-size: 1.5rem; color: var(--bone); }
  .masthead-sub {
    font-size: 0.68rem; letter-spacing: 0.16em; color: var(--brass-bright);
    text-transform: uppercase; margin-top: 6px; font-weight: 600;
  }
  .count-badge {
    font-size: 0.7rem; color: var(--bone-dim); letter-spacing: 0.05em;
    border: 1px solid var(--hairline); padding: 6px 12px;
  }

  /* SEARCH */
  .search-row { display: flex; gap: 10px; }
  .search-input {
    flex: 1; background: var(--ink-soft); border: 1px solid var(--hairline);
    color: var(--bone); padding: 11px 14px; font-family: inherit; font-size: 0.85rem;
  }
  .search-input::placeholder { color: var(--bone-faint); }
  .search-input:focus { outline: none; border-color: var(--brass); }

  /* CATEGORY TABS */
  .category-tabs {
    max-width: 980px; margin: 18px auto 0; padding: 0 20px;
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .cat-tab {
    background: transparent; border: 1px solid var(--hairline); color: var(--bone-dim);
    padding: 9px 14px; font-family: inherit; font-size: 0.7rem; letter-spacing: 0.06em;
    text-transform: uppercase; font-weight: 700; cursor: pointer;
  }
  .cat-tab.active { background: var(--brass); border-color: var(--brass); color: var(--ink); }

  /* TAG FILTER ROW */
  .tag-row {
    max-width: 980px; margin: 12px auto 0; padding: 0 20px;
    display: flex; gap: 7px; flex-wrap: wrap;
  }
  .tag-chip {
    background: transparent; border: 1px solid var(--hairline); color: var(--bone-faint);
    padding: 5px 11px; font-family: inherit; font-size: 0.64rem; letter-spacing: 0.04em;
    text-transform: uppercase; cursor: pointer; border-radius: 2px;
  }
  .tag-chip.active { border-color: var(--signal); color: var(--signal); }

  /* SYSTEM SECTION */
  .system-section { max-width: 980px; margin: 36px auto 0; padding: 0 20px; }
  .system-header {
    display: flex; align-items: baseline; gap: 12px;
    border-bottom: 1px solid var(--brass); padding-bottom: 10px; margin-bottom: 16px;
  }
  .system-title { font-size: 1.05rem; color: var(--bone); }
  .system-meta { font-size: 0.68rem; color: var(--bone-faint); letter-spacing: 0.06em; }

  .exercise-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 12px; margin-bottom: 10px;
  }
  @media (max-width: 720px) { .exercise-grid { grid-template-columns: 1fr; } }

  .ex-card {
    border: 1px solid var(--hairline); background: var(--ink-card);
    padding: 16px 17px; cursor: pointer; transition: border-color 0.15s ease;
  }
  .ex-card:hover { border-color: var(--brass); }
  .ex-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .ex-card-title { font-size: 0.88rem; color: var(--bone); font-weight: 600; line-height: 1.3; }
  .ex-card-reps { font-size: 0.7rem; color: var(--brass-bright); font-weight: 700; white-space: nowrap; }
  .ex-card-purpose { font-size: 0.74rem; color: var(--bone-faint); margin-top: 6px; line-height: 1.4; font-style: italic; }
  .ex-card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .mini-tag {
    font-size: 0.6rem; color: var(--bone-faint); border: 1px solid var(--hairline);
    padding: 2px 7px; letter-spacing: 0.04em; text-transform: uppercase;
  }

  .ex-card-body {
    max-height: 0; overflow: hidden; transition: max-height 0.3s ease;
  }
  .ex-card-body.open { max-height: 500px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--hairline); }
  .ex-steps { font-size: 0.78rem; color: var(--bone-dim); line-height: 1.7; }
  .ex-steps ol { margin: 0; padding-left: 18px; }
  .ex-cue-box {
    margin-top: 10px; font-size: 0.74rem; color: var(--brass-bright);
    border-left: 2px solid var(--brass); padding-left: 10px; font-style: italic;
  }

  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--bone-faint); font-size: 0.85rem;
  }

  footer {
    text-align: center; padding: 40px 20px 60px; font-size: 0.68rem;
    color: var(--bone-faint); letter-spacing: 0.08em; border-top: 1px solid var(--hairline);
    max-width: 980px; margin: 50px auto 0;
  }
</style>
</head>
<body>

<div class="masthead">
  <div class="masthead-inner">
    <div class="masthead-top">
      <div>
        <div class="masthead-title display">The Field Manual</div>
        <div class="masthead-sub">Full exercise library — growing weekly</div>
      </div>
      <div class="count-badge" id="countBadge">0 exercises</div>
    </div>
    <div class="search-row">
      <input class="search-input" id="searchInput" placeholder="Search exercises, e.g. 'tongue', 'glute', 'sciatic'..." oninput="renderAll()">
    </div>
  </div>
</div>

<div class="category-tabs" id="categoryTabs"></div>
<div class="tag-row" id="tagRow"></div>

<div id="libraryContainer"></div>

<footer>
  This library is continuously updated. Form cues matter more than rep count — quality over volume, every time.
</footer>

<script>
/* ============== DATA ============== */
const SYSTEMS = [
  { id: "airway", name: "Airway / Orofacial System", meta: "Tongue, lips, jaw, breathing mechanics" },
  { id: "spine", name: "Spine / Cervical System", meta: "Neck, thoracic, postural chain" },
  { id: "core", name: "Core / Pelvic System", meta: "Deep core, pelvic floor, lumbar stability" },
  { id: "lowerlimb", name: "Lower Limb / Gait System", meta: "Hip, knee, ankle, sciatic, running mechanics" }
];

const EXERCISES = [
  // ===== AIRWAY / OROFACIAL =====
  {
    system: "airway", title: "Tongue Spot Hold",
    reps: "Build to all-day", purpose: "Resting tongue posture — the foundation everything else is built on.",
    tags: ["tongue", "posture", "daily"],
    steps: [
      "Find the 'spot' — the ridge just behind your upper front teeth, not the teeth themselves.",
      "Suction your whole tongue (not just the tip) flat against the roof of your mouth.",
      "Lips closed, teeth slightly apart, jaw relaxed.",
      "Hold as your passive resting position — return to it constantly throughout the day."
    ],
    cue: "This isn't a rep-based drill. It's the default state you're rebuilding."
  },
  {
    system: "airway", title: "Tongue Suction Snap (Click)",
    reps: "20 reps", purpose: "Builds the suction strength needed to hold the spot position.",
    tags: ["tongue", "strength"],
    steps: [
      "Suction your entire tongue flat to the roof of your mouth.",
      "Drop it down sharply to produce a 'click' sound.",
      "Reset and repeat."
    ],
    cue: "The louder and cleaner the click, the better the suction."
  },
  {
    system: "airway", title: "Tongue Push-Up",
    reps: "10 reps × 5 sec hold", purpose: "Strengthens the muscle group that holds the tongue against the palate.",
    tags: ["tongue", "strength"],
    steps: [
      "Tongue flat against the roof of the mouth.",
      "Push up hard into the palate.",
      "Hold 5 seconds, release, repeat."
    ]
  },
  {
    system: "airway", title: "Resisted Swallow",
    reps: "10 reps", purpose: "Retrains correct swallow pattern — tongue stays up instead of thrusting forward.",
    tags: ["tongue", "swallow"],
    steps: [
      "Suction tongue to the roof of the mouth (spot position).",
      "Swallow without letting the tongue drop or push against the teeth.",
      "If you feel your tongue push forward into your teeth, you've reverted to the old pattern — reset and retry."
    ]
  },
  {
    system: "airway", title: "Button Pull (Lip Seal Strength)",
    reps: "10 × 10 sec", purpose: "Builds lip seal strength so the mouth doesn't drift open at rest or in sleep.",
    tags: ["lips", "strength"],
    steps: [
      "Place a button or myofunctional therapy disc behind the lips, attached to a string.",
      "Lips sealed around it, pull the string outward gently.",
      "Hold tension 10 seconds, release."
    ]
  },
  {
    system: "airway", title: "Lip Purse Holds",
    reps: "15 × 5 sec", purpose: "Lip seal endurance.",
    tags: ["lips", "strength"],
    steps: [
      "Purse lips tightly together, like holding a coin between them.",
      "Hold 5 seconds, release fully, repeat."
    ]
  },
  {
    system: "airway", title: "Spot-Hold Passive Practice",
    reps: "10 min, passive", purpose: "Extended low-effort posture training — train the habit, not the muscle.",
    tags: ["tongue", "habit"],
    steps: [
      "While reading, watching TV, or doing low-focus tasks, hold tongue in spot position.",
      "Lips sealed, breathing through nose only.",
      "No active effort — just sustained correct posture."
    ]
  },
  {
    system: "airway", title: "4-Alarm Nasal Breathing Check",
    reps: "4×/day, 60 sec each", purpose: "Daytime habit interrupt — catches the mouth-breathing default before it compounds.",
    tags: ["habit", "breathing", "daily"],
    steps: [
      "At each alarm: check lips sealed, tongue on spot, breathing through nose.",
      "Correct whatever's off.",
      "Hold the corrected position for 60 seconds before returning to task."
    ]
  },

  // ===== SPINE / CERVICAL =====
  {
    system: "spine", title: "Chin Tucks",
    reps: "10 reps × 5 sec hold", purpose: "Corrects forward head posture — direct counter to mouth-breathing-driven head drift.",
    tags: ["neck", "posture", "daily"],
    steps: [
      "Sitting or standing tall, pull chin straight back — like making a double chin.",
      "Do not tilt the head down, keep eyes level.",
      "Hold 5 seconds, release."
    ],
    cue: "You should feel this at the base of the skull, not the throat."
  },
  {
    system: "spine", title: "Suboccipital Release",
    reps: "60 sec", purpose: "Releases the muscle group most overworked by forward head posture.",
    tags: ["neck", "release"],
    steps: [
      "Place two fingers (or a tennis ball) at the base of the skull, just off the spine.",
      "Apply gentle sustained pressure.",
      "Slowly nod 'yes' in a small range of motion while holding pressure."
    ],
    cue: "Sustained pressure beats rolling — give the tissue time to release, don't rush it."
  },
  {
    system: "spine", title: "Levator Scap Stretch",
    reps: "30 sec / side", purpose: "Releases a common chronic-tension site at the neck-shoulder junction.",
    tags: ["neck", "stretch"],
    steps: [
      "Tilt one ear toward the same-side chest.",
      "Rotate chin slightly toward the opposite armpit.",
      "Hold, breathing normally, then switch sides."
    ]
  },
  {
    system: "spine", title: "Wall Angels",
    reps: "10 reps", purpose: "Restores scapular mobility and counters rounded-shoulder posture.",
    tags: ["shoulder", "posture"],
    steps: [
      "Stand with back flat against a wall, arms in a 'W' position.",
      "Slide arms upward into a 'Y' shape while keeping contact with the wall.",
      "Slide back down to 'W,' repeat."
    ]
  },
  {
    system: "spine", title: "Scalene Stretch",
    reps: "30 sec / side", purpose: "Releases lateral neck tension that contributes to thoracic outlet compression.",
    tags: ["neck", "stretch"],
    steps: [
      "Place one hand flat on the collarbone to anchor it down.",
      "Tilt the opposite ear away from that shoulder.",
      "Hold gently, switch sides."
    ]
  },
  {
    system: "spine", title: "Cat-Camel",
    reps: "10 reps, slow", purpose: "Mobilizes the full spine through flexion and extension.",
    tags: ["thoracic", "mobility", "daily"],
    steps: [
      "On hands and knees, drop the belly and lift the chest (camel/extension).",
      "Round the spine fully, tucking chin to chest (cat/flexion).",
      "Move slowly through the full range, breathing through the transition."
    ]
  },
  {
    system: "spine", title: "Open Books",
    reps: "10 / side", purpose: "Restores thoracic rotation, often lost with prolonged sitting and guarding.",
    tags: ["thoracic", "rotation", "daily"],
    steps: [
      "Lie on your side, knees bent, arms extended together in front of you.",
      "Rotate the top arm across your body and open it toward the floor behind you, following with your eyes.",
      "Let the chest open fully, then return to start."
    ]
  },
  {
    system: "spine", title: "Thoracic Extension Over Foam Roller",
    reps: "5 positions × 3 reps", purpose: "Targeted extension through the mid-back to counter forward-flexed posture.",
    tags: ["thoracic", "mobility"],
    steps: [
      "Place a foam roller horizontally under the mid-back, knees bent, feet flat.",
      "Support the head with hands, extend gently back over the roller.",
      "Move the roller to a new position along the spine, repeat."
    ]
  },

  // ===== CORE / PELVIC =====
  {
    system: "core", title: "90/90 Diaphragmatic Breathing",
    reps: "5 breaths", purpose: "Nervous system reset — the gateway exercise before any loading work.",
    tags: ["breathing", "nervous-system", "daily"],
    steps: [
      "Lie on your back, feet up on a couch or chair so hips and knees are at 90 degrees.",
      "One hand on chest, one on belly.",
      "Inhale through the nose for 4 seconds, exhale slowly for 6–8 seconds.",
      "Relax the jaw, tongue lightly on the roof of the mouth, let shoulders soften into the floor."
    ],
    cue: "If your chest hand moves more than your belly hand, you're breathing wrong for this drill."
  },
  {
    system: "core", title: "Dead Bug",
    reps: "2 × 8 / side, slow", purpose: "Deep core stability without spinal loading — safe for compromised backs.",
    tags: ["core", "stability"],
    steps: [
      "Lie on your back, arms straight up, knees bent at 90 degrees over hips.",
      "Slowly lower one arm overhead and the opposite leg toward the floor.",
      "Keep the low back flat against the floor the entire time.",
      "Return to start, alternate sides."
    ],
    cue: "Maintain breathing throughout — don't hold your breath to brace."
  },
  {
    system: "core", title: "Bird Dog",
    reps: "2 × 8 / side", purpose: "Cross-body stability and pelvic control.",
    tags: ["core", "stability", "daily"],
    steps: [
      "On hands and knees, extend one arm forward and the opposite leg back simultaneously.",
      "Keep the pelvis level — don't let the hips rotate.",
      "Hold briefly, return to start, alternate sides."
    ]
  },
  {
    system: "core", title: "Glute Bridge",
    reps: "2 × 12, pause 3 sec at top", purpose: "Posterior chain activation — critical when glutes are underactive from compensation patterns.",
    tags: ["glute", "posterior-chain", "daily"],
    steps: [
      "Lie on your back, knees bent, feet flat, hip-width apart.",
      "Drive through the heels to lift hips up until knees-hips-shoulders form a straight line.",
      "Pause 3 seconds at the top, squeezing glutes.",
      "Lower with control."
    ]
  },
  {
    system: "core", title: "Clamshell",
    reps: "2 × 15 / side", purpose: "Isolates hip external rotators — often weak and a contributor to compensatory gait patterns.",
    tags: ["glute", "hip", "stability"],
    steps: [
      "Lie on your side, knees bent, feet together, hips stacked.",
      "Keeping feet touching, rotate the top knee open like a clamshell.",
      "Control the movement back down — don't let momentum do the work."
    ]
  },

  // ===== LOWER LIMB / GAIT =====
  {
    system: "lowerlimb", title: "Single-Leg Stance",
    reps: "30 sec × 2, each leg", purpose: "Proprioception and ankle/hip stability — directly relevant to gait compensation patterns.",
    tags: ["balance", "proprioception", "daily"],
    steps: [
      "Stand on one leg, slight bend in the standing knee, hands relaxed at sides.",
      "Hold for 30 seconds without touching down.",
      "Progress to eyes closed once stable."
    ],
    cue: "If you can't hold this for 30 sec on one side, that's information — it usually points to the side that's compensating."
  },
  {
    system: "lowerlimb", title: "Scapula Prone Y Raise",
    reps: "2 × 10, no weight initially", purpose: "Lower trap activation — supports posture and shoulder mechanics that influence overall gait and breathing.",
    tags: ["shoulder", "posture"],
    steps: [
      "Lie face down, arms extended overhead in a 'Y' shape, thumbs up.",
      "Lift arms slightly off the ground, squeezing shoulder blades down and together.",
      "Lower with control."
    ]
  },
  {
    system: "lowerlimb", title: "McKenzie Extension (L5-S1 Protocol)",
    reps: "Per PT guidance — typically 10 reps, several sets/day", purpose: "Centralizes disc-related referred pain; confirmed effective for documented L5-S1 disc bulge.",
    tags: ["sciatic", "disc", "pt-prescribed"],
    steps: [
      "Lie face down, hands under shoulders.",
      "Press the upper body up while keeping the hips on the floor (like a gentle cobra).",
      "Hold briefly at end range, lower with control.",
      "Stop and reassess if symptoms move further down the leg — should centralize toward the spine, not extend outward."
    ],
    cue: "This is a PT-directed protocol. Follow your provider's specific rep/set prescription over this default."
  },
  {
    system: "lowerlimb", title: "Lateral Flexion (Confirmed Effective)",
    reps: "Per PT guidance", purpose: "Documented as effective for your specific QL spasm / L5-S1 presentation.",
    tags: ["sciatic", "QL", "pt-prescribed"],
    steps: [
      "Standing or side-lying, slowly bend laterally toward the affected side.",
      "Move within a pain-free range — this is about relief, not stretching to a limit.",
      "Return to neutral with control."
    ],
    cue: "This is a relief movement, not a strength movement. Stop if anything sharpens."
  },
  {
    system: "lowerlimb", title: "Zone 2 Walk / Run",
    reps: "20–30 min, Zone 2 HR (60–70% max)", purpose: "Builds aerobic base without overloading the kinetic chain — your primary gating variable for marathon training.",
    tags: ["aerobic", "gait", "daily"],
    steps: [
      "Use Apple Watch HR tracking — stay in 60–70% of max heart rate.",
      "You should be able to hold a conversation the entire time.",
      "If HR drifts above zone, slow down — pace is not the metric, heart rate is."
    ],
    cue: "Going faster than Zone 2 on aerobic-base days is the single most common way overtraining cascades start."
  }
];

/* ============== STATE ============== */
let activeCategory = "all";
let activeTags = new Set();
let openCards = new Set();

function allTags() {
  const t = new Set();
  EXERCISES.forEach(e => e.tags.forEach(tag => t.add(tag)));
  return [...t].sort();
}

function renderTabs() {
  const tabs = document.getElementById('categoryTabs');
  let html = `<button class="cat-tab ${activeCategory === 'all' ? 'active' : ''}" onclick="setCategory('all')">All Systems</button>`;
  SYSTEMS.forEach(s => {
    html += `<button class="cat-tab ${activeCategory === s.id ? 'active' : ''}" onclick="setCategory('${s.id}')">${s.name.split(' / ')[0]}</button>`;
  });
  tabs.innerHTML = html;
}

function renderTagRow() {
  const row = document.getElementById('tagRow');
  row.innerHTML = allTags().map(tag =>
    `<button class="tag-chip ${activeTags.has(tag) ? 'active' : ''}" onclick="toggleTag('${tag}')">${tag}</button>`
  ).join('');
}

function setCategory(id) {
  activeCategory = id;
  renderTabs();
  renderAll();
}

function toggleTag(tag) {
  if (activeTags.has(tag)) activeTags.delete(tag); else activeTags.add(tag);
  renderTagRow();
  renderAll();
}

function toggleCard(key) {
  if (openCards.has(key)) openCards.delete(key); else openCards.add(key);
  renderAll();
}

function matchesFilters(ex) {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (activeCategory !== 'all' && ex.system !== activeCategory) return false;
  if (activeTags.size > 0 && ![...activeTags].every(t => ex.tags.includes(t))) return false;
  if (q) {
    const hay = (ex.title + ' ' + ex.purpose + ' ' + ex.tags.join(' ')).toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function renderAll() {
  const container = document.getElementById('libraryContainer');
  container.innerHTML = '';
  let totalShown = 0;

  SYSTEMS.forEach(sys => {
    const items = EXERCISES.filter(e => e.system === sys.id && matchesFilters(e));
    if (items.length === 0) return;
    totalShown += items.length;

    const section = document.createElement('div');
    section.className = 'system-section';

    const cards = items.map((ex, idx) => {
      const key = sys.id + '-' + idx;
      const isOpen = openCards.has(key);
      return `
        <div class="ex-card" onclick="toggleCard('${key}')">
          <div class="ex-card-top">
            <div class="ex-card-title">${ex.title}</div>
            <div class="ex-card-reps">${ex.reps}</div>
          </div>
          <div class="ex-card-purpose">${ex.purpose}</div>
          <div class="ex-card-tags">${ex.tags.map(t => `<span class="mini-tag">${t}</span>`).join('')}</div>
          <div class="ex-card-body ${isOpen ? 'open' : ''}">
            <div class="ex-steps"><ol>${ex.steps.map(s => `<li>${s}</li>`).join('')}</ol></div>
            ${ex.cue ? `<div class="ex-cue-box">${ex.cue}</div>` : ''}
          </div>
        </div>
      `;
    }).join('');

    section.innerHTML = `
      <div class="system-header">
        <div class="system-title display" style="font-size:1rem;">${sys.name}</div>
        <div class="system-meta">${sys.meta} — ${items.length} exercise${items.length !== 1 ? 's' : ''}</div>
      </div>
      <div class="exercise-grid">${cards}</div>
    `;
    container.appendChild(section);
  });

  if (totalShown === 0) {
    container.innerHTML = `<div class="empty-state">No exercises match that search. Try a different term or clear filters.</div>`;
  }

  document.getElementById('countBadge').textContent = `${EXERCISES.length} exercises`;
}

renderTabs();
renderTagRow();
renderAll();
</script>

</body>
</html>
